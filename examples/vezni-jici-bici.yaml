# Typický věžní hodinový stroj — jicí (jdoucí) i bicí soukolí.
# Flatbed (litinový) rám, dvě závaží, kotvový krok, vteřinové kyvadlo,
# počitadlové (Schlossscheibe) hodinové bití na jeden cimbál.
# Počty zubů jsou ILUSTRATIVNÍ pro běžný stroj 19. století (ne konkrétní kus),
# ale převody jicího soukolí dávají vteřinové kyvadlo (3600 kmitů/h).
# yaml-language-server: $schema=../schema/horonotace.schema.json

horonotace: "0.1"

hlavicka:
  nazev: "Věžní hodiny — typický stroj (jicí + bicí)"
  typ: vezni
  datace: "19. století"
  pozn: "Běžný flatbed stroj; počty zubů ilustrativní, převody jicího soukolí reálné (vteřinové kyvadlo)."

stroj:
  konstrukce: { typ: flatbed-ram, material: "litina", pozn: "horizontální litinový rám se stojkami (A-rámy); klecový rám je starší varianta" }

  # --- ÚROVEŇ 1: funkční ústrojí ---
  ustroji:
    - { id: pohon-j, typ: pohon, nazev: "Pohon jicího soukolí (závaží)" }
    - { id: jdouci, typ: soukoli-jdouci, nazev: "Jicí soukolí" }
    - { id: krok, typ: krok, nazev: "Krok" }
    - { id: oscilator, typ: oscilator, nazev: "Oscilátor (kyvadlo)" }
    - { id: pohon-b, typ: pohon, nazev: "Pohon bicího soukolí (závaží)" }
    - { id: bici, typ: soukoli-bici, nazev: "Bicí soukolí (počitadlové)" }
    - { id: ukazovaci, typ: ukazovaci, nazev: "Ukazovací ústrojí (ručky)" }

  # --- ÚROVEŇ 2: prvky ---
  prvky:
    # === JICÍ SOUKOLÍ ===
    - { id: buben-j, typ: buben, ustroji: pohon-j, prumer: "180 mm", otacky: 8, lano: "ocelové lano", pozn: "lanový buben souosý s hnacím kolem; 8 návinů ≈ doba chodu" }
    - { id: zavazi-j, typ: zavazi, ustroji: pohon-j, pozn: "závaží jicího stroje na laně z bubnu" }
    - { id: ctyrhran-j, typ: natahovaci-ctyrhran, ustroji: pohon-j, pozn: "natahování klikou" }
    - { id: klika-j, typ: klika, ustroji: pohon-j }
    - { id: hlavni-kolo-j, typ: kolo, role: hlavni, ustroji: jdouci, zuby: 96, pozn: "hnací (hlavní) kolo, souosé s lanovým bubnem" }
    - { id: p-stredni, typ: pastorek, ustroji: jdouci, zuby: 12 }
    - { id: stredni-kolo, typ: kolo, role: minutove, ustroji: jdouci, zuby: 96, pozn: "kolo minutové — 1 ot./h, nese minutovou ručku" }
    - { id: p-treti, typ: pastorek, ustroji: jdouci, zuby: 12 }
    - { id: treti-kolo, typ: kolo, role: mezitimni, ustroji: jdouci, zuby: 90, pozn: "kolo mezitimní (třetí)" }
    - { id: p-krokove, typ: pastorek, ustroji: jdouci, zuby: 12 }
    # krok + oscilátor
    - { id: krokove-kolo, typ: krokove-kolo, ustroji: krok, zuby: 30, pozn: "30 zubů × 2 kmity = 60 kmitů/ot.; 60 ot./h = 3600 kmitů/h" }
    - { id: kotva, typ: kotva, ustroji: krok, pozn: "kotvový (vratný) krok" }
    - { id: krok-typ, typ: krok, druh: kotvovy, ustroji: krok, pozn: "odkaz /kroky/kotvovy" }
    - { id: kyvadlo, typ: kyvadlo, ustroji: oscilator, perioda: "2 s", pozn: "vteřinové kyvadlo (~0,994 m)" }

    # === BICÍ SOUKOLÍ (počitadlové hodinové bití) ===
    - { id: buben-b, typ: buben, ustroji: pohon-b, prumer: "180 mm", otacky: 8, lano: "ocelové lano", pozn: "lanový buben souosý s hnacím kolem bicího stroje" }
    - { id: zavazi-b, typ: zavazi, ustroji: pohon-b, pozn: "závaží bicího stroje na laně z bubnu" }
    - { id: hlavni-kolo-b, typ: kolo, role: hlavni, ustroji: bici, zuby: 96, pozn: "hnací kolo bicího stroje, souosé s lanovým bubnem" }
    - { id: p-bici2, typ: pastorek, ustroji: bici, zuby: 12 }
    - { id: kolo-bici2, typ: kolo, ustroji: bici, zuby: 84 }
    - { id: p-kolikove, typ: pastorek, ustroji: bici, zuby: 12 }
    - { id: kolikove-kolo, typ: kolo, role: kolickove, ustroji: bici, zuby: 48, pozn: "8 kolíků zvedá ocas kladiva (8 úderů/ot.)" }
    - { id: p-vetrnik, typ: pastorek, ustroji: bici, zuby: 8 }
    - { id: vetrnik, typ: vetrnik, ustroji: bici, pozn: "větrník (vzdušná brzda) — reguluje rychlost bití" }
    - { id: pocitadlo, typ: zaverka, druh: pocitadlo, ustroji: bici, pozn: "závěrkové (počítací) kolo — zářezy 1+2+…+12 = 78, 1 ot./12 h" }
    - { id: vypousteci, typ: vypousteci-paka, ustroji: bici, pozn: "zvedaná kolíkem jicího soukolí v celou hodinu" }
    - { id: zaverna, typ: zaverna-paka, ustroji: bici, pozn: "nos padá do výřezu závěrky = zámek" }
    - { id: kladivko, typ: kladivko, ustroji: bici, pozn: "kladivo zvonu, zvedané kolíky kolíkového kola" }
    - { id: cimbal, typ: cimbal, pocet: 1, ustroji: bici, pozn: "cimbál (zvon) hodinového bití" }

    # === UKAZOVACÍ ÚSTROJÍ ===
    - { id: cifernik, typ: cifernik, ustroji: ukazovaci }
    - { id: soukoli-rucek, typ: soukoli-rucek, ustroji: ukazovaci, pozn: "převod 12:1 z minutové na hodinovou ručku" }
    - { id: rucka-m, typ: rucka, ukazuje: "minuty", ustroji: ukazovaci }
    - { id: rucka-h, typ: rucka, ukazuje: "hodiny", ustroji: ukazovaci }

  # --- HŘÍDELE ---
  hridele:
    # jicí
    - { id: h-barrel-j, nese: [buben-j, hlavni-kolo-j, ctyrhran-j, klika-j], perioda: "8 h", pozn: "hřídel natahování: čtyřhran + klika + lanový buben + hnací kolo (souosé)" }
    - { id: h-stredni, nese: [p-stredni, stredni-kolo], perioda: "1 h" }
    - { id: h-treti, nese: [p-treti, treti-kolo] }
    - { id: h-krokove, nese: [p-krokove, krokove-kolo, kotva], perioda: "1 min" }
    # bicí
    - { id: h-barrel-b, nese: [buben-b, hlavni-kolo-b], pozn: "lanový buben + hnací kolo (souosé)" }
    - { id: h-bici2, nese: [p-bici2, kolo-bici2] }
    - { id: h-kolikove, nese: [p-kolikove, kolikove-kolo] }
    - { id: h-vetrnik, nese: [p-vetrnik, vetrnik] }
    - { id: h-pocitadlo, nese: [pocitadlo] }

  # --- VAZBY ---
  vazby:
    # jicí: závaží na laně z bubnu → buben souosý s hnacím kolem → záběry → krok
    - { typ: pohon, z: zavazi-j, do: buben-j, pozn: "lano závaží na obvodu bubnu" }
    - { typ: zaber, z: hlavni-kolo-j, do: p-stredni }     # 96/12 = 8
    - { typ: zaber, z: stredni-kolo, do: p-treti }        # 96/12 = 8
    - { typ: zaber, z: treti-kolo, do: p-krokove }        # 90/12 = 7,5  → 8×8×7,5 vč. krok. kola
    - { typ: tok, z: jdouci, do: krok }
    - { typ: tok, z: krok, do: oscilator }
    # ručky
    - { typ: pohani, z: stredni-kolo, do: rucka-m }
    - { typ: pohani, z: soukoli-rucek, do: rucka-h }
    # bicí: závaží na laně z bubnu → buben souosý s hnacím kolem → záběry → větrník
    - { typ: pohon, z: zavazi-b, do: buben-b, pozn: "lano závaží na obvodu bubnu" }
    - { typ: zaber, z: hlavni-kolo-b, do: p-bici2 }       # 96/12 = 8
    - { typ: zaber, z: kolo-bici2, do: p-kolikove }       # 84/12 = 7
    - { typ: zaber, z: kolikove-kolo, do: p-vetrnik }     # 48/8  = 6
    # spouštění bití z jicího stroje (v celou hodinu) + počitadlo řídí počet úderů
    # regulace bití: kolík jicího soukolí → vypouštěcí páka → závěrná páka; závěrka řídí zámek
    - { typ: spousteni, z: stredni-kolo, do: vypousteci, pozn: "kolík minutového kola v celou hodinu zvedne páku" }
    - { typ: spousteni, z: vypousteci, do: zaverna, pozn: "uvolní závěrnou páku → stroj bije" }
    - { typ: blokuje, z: pocitadlo, do: zaverna, pozn: "výřezy závěrky řídí, kdy nos padne (počet úderů)" }
    - { typ: blokuje, z: zaverna, do: hlavni-kolo-b, pozn: "nos v hlubokém výřezu = zámek bicího soukolí" }
    - { typ: spousteni, z: kolikove-kolo, do: kladivko, pozn: "kolíky zvedají kladivo" }
    - { typ: spousteni, z: kladivko, do: cimbal, pozn: "úder na cimbál" }
