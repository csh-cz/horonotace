<!doctype html>
<html lang="cs">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Horonotace — galerie</title>
<style>
  :root { --paper:#f4eedd; --ink:#1f1c14; --mut:#6b6253; --accent:#9a3b2e; --line:#d8cfb8; --panel:#efe7d2; }
  * { box-sizing:border-box; }
  body { margin:0; background:var(--paper); color:var(--ink);
    font-family:Georgia,'Times New Roman',serif; line-height:1.5; }
  header { padding:22px 20px 10px; max-width:1100px; margin:0 auto; }
  h1 { margin:0; font-size:26px; }
  .tag { color:var(--mut); font-size:13px; margin:4px 0 12px; }
  nav a { color:var(--accent); text-decoration:none; font-size:13px; margin-right:16px; border-bottom:1px solid transparent; }
  nav a:hover { border-bottom-color:var(--accent); }
  .wrap { max-width:1100px; margin:0 auto; padding:0 20px 40px; }
  .controls { display:flex; flex-wrap:wrap; gap:10px 18px; align-items:center;
    background:var(--panel); border:1px solid var(--line); border-radius:8px; padding:12px 14px; margin:14px 0; }
  .controls .grp { display:flex; gap:6px; align-items:center; flex-wrap:wrap; }
  label.lbl { font-size:12px; color:var(--mut); }
  select { font-family:inherit; font-size:13px; padding:4px 8px; border:1px solid var(--line);
    border-radius:5px; background:#fff; }
  .tab { font-size:13px; padding:5px 12px; border:1px solid var(--line); border-radius:20px;
    background:#fff; color:var(--mut); cursor:pointer; }
  .tab.on { background:var(--accent); color:#fff; border-color:var(--accent); }
  .tab.dis { opacity:.35; cursor:not-allowed; }
  .seg { display:inline-flex; border:1px solid #b0863a; border-radius:20px; overflow:hidden; }
  .seg span { padding:5px 12px; font-size:13px; cursor:pointer; color:var(--mut); }
  .seg span.on { background:#b0863a; color:#fff; }
  .stage { border:1px solid var(--line); border-radius:8px; background:#fbf7ec; padding:16px;
    min-height:340px; display:flex; align-items:center; justify-content:center; overflow:auto; }
  .stage img { max-width:100%; height:auto; }
  .cap { color:var(--mut); font-size:12.5px; margin:8px 2px 0; }
  footer { max-width:1100px; margin:0 auto; padding:16px 20px 40px; color:var(--mut); font-size:12px;
    border-top:1px solid var(--line); }
  code { background:var(--panel); padding:1px 5px; border-radius:4px; font-size:12px; }
</style>
</head>
<body>
<header>
  <h1>Horonotace</h1>
  <div class="tag" data-i18n="tag">Notace pro schématický popis hodinových strojů — galerie příkladů (vrstvy C · D · E).</div>
  <nav>
    <a id="nSpec" href="https://github.com/csh-cz/horonotace/blob/main/spec/specifikace.md">Specifikace</a>
    <a href="https://github.com/csh-cz/horonotace">GitHub</a>
    <a href="https://github.com/csh-cz/horonotace/releases/tag/v0.1" data-i18n="rel">Ke stažení (DOCX, v0.1)</a>
  </nav>
</header>
<div class="wrap">
  <div class="controls">
    <div class="grp">
      <label class="lbl" for="ex" data-i18n="ex">Příklad:</label>
      <select id="ex"></select>
    </div>
    <div class="grp" id="tabs"></div>
    <div class="grp" style="margin-left:auto">
      <span class="seg" id="lang">
        <span data-l="cs" class="on">CS</span><span data-l="en">EN</span>
      </span>
    </div>
  </div>
  <div class="stage"><img id="view" alt=""></div>
  <div class="cap" id="cap"></div>
</div>
<footer>
  <span data-i18n="foot">Schémata generuje sada rendererů (Python) z modelu YAML + JSON Schema.</span>
  © David Knespl / ČSH · EUPL-1.2 (kód) + CC-BY-4.0 (dokumentace).
</footer>
<script>
const T = {
  cs:{tag:"Notace pro schématický popis hodinových strojů — galerie příkladů (vrstvy C · D · E).",
      ex:"Příklad:", rel:"Ke stažení (DOCX, v0.1)", spec:"Specifikace",
      foot:"Schémata generuje sada rendererů (Python) z modelu YAML + JSON Schema.",
      L:{C:"C · elevace", D:"D · číselník", E:"E · čelní pohled"}},
  en:{tag:"A notation for the schematic description of clock movements — example gallery (layers C · D · E).",
      ex:"Example:", rel:"Downloads (DOCX, v0.1)", spec:"Specification",
      foot:"Diagrams are generated by a set of Python renderers from a YAML + JSON Schema model.",
      L:{C:"C · elevation", D:"D · dial", E:"E · front view"}}
};
const EXAMPLES = [
  {id:"vezni-jici-bici",      cs:"Věžní stroj (jicí + bicí)",       en:"Tower clock (going + striking)", L:["C","E"]},
  {id:"italske-vezni",        cs:"Italský stroj (imaginární)",       en:"Italian clock (imaginary)",      L:["C","E","D"]},
  {id:"praga-orloj",          cs:"Pražský orloj",                    en:"Prague Orloj",                   L:["C","E","D"]},
  {id:"praga-orloj-taborsky", cs:"Orloj — Táborský 1570",            en:"Orloj — Táborský 1570",          L:["C","E"]},
  {id:"orloj-astrolab",       cs:"Astroláb (zjednodušený)",          en:"Astrolabe (simplified)",         L:["C","E","D"]},
  {id:"ukazka-jednoduchy",    cs:"Jednoduchý závažový stroj",        en:"Simple weight-driven movement",  L:["C","E"]},
  {id:"vezni-pocitadlo",      cs:"Věžní stroj — počitadlo",          en:"Tower clock — count wheel",      L:["C","E"]},
  {id:"__sym",                cs:"Katalog symbolů",                  en:"Symbol catalogue",               L:["S"]}
];
let lang="cs", exi=0, layer="C";
const $=s=>document.querySelector(s);
function file(){
  const e=EXAMPLES[exi], s=lang==="en"?"-en":"";
  if(e.id==="__sym") return `render/symboly${s}.svg`;
  if(layer==="C") return `render/${e.id}${s}.svg`;
  if(layer==="E") return `render/${e.id}-front${s}.svg`;
  if(layer==="D") return `render/${e.id}-cifernik${s}.svg`;
  return "";
}
function renderTabs(){
  const e=EXAMPLES[exi], box=$("#tabs"); box.innerHTML="";
  if(e.id==="__sym"){ layer="S"; return; }
  if(!e.L.includes(layer)) layer=e.L[0];
  e.L.forEach(L=>{
    const d=document.createElement("div");
    d.className="tab"+(L===layer?" on":""); d.textContent=T[lang].L[L];
    d.onclick=()=>{ layer=L; draw(); }; box.appendChild(d);
  });
}
function draw(){
  renderTabs();
  const img=$("#view"), e=EXAMPLES[exi];
  img.src=file(); img.alt=(lang==="en"?e.en:e.cs);
  $("#cap").textContent=(lang==="en"?e.en:e.cs)+(e.id==="__sym"?"":" — "+(T[lang].L[layer]||""));
}
function applyI18n(){
  document.querySelectorAll("[data-i18n]").forEach(el=>{ el.textContent=T[lang][el.dataset.i18n]; });
  $("#nSpec").textContent=T[lang].spec;
  $("#nSpec").href="https://github.com/csh-cz/horonotace/blob/main/spec/"+(lang==="en"?"specification.en.md":"specifikace.md");
  document.documentElement.lang=lang;
}
function init(){
  const sel=$("#ex");
  EXAMPLES.forEach((e,i)=>{ const o=document.createElement("option"); o.value=i; o.textContent=e.cs; sel.appendChild(o); });
  sel.onchange=()=>{ exi=+sel.value; draw(); };
  $("#lang").querySelectorAll("span").forEach(s=>{ s.onclick=()=>{
    lang=s.dataset.l;
    $("#lang").querySelectorAll("span").forEach(x=>x.classList.toggle("on", x.dataset.l===lang));
    [...sel.options].forEach((o,i)=>o.textContent=lang==="en"?EXAMPLES[i].en:EXAMPLES[i].cs);
    applyI18n(); draw();
  };});
  applyI18n(); draw();
}
init();
</script>
</body>
</html>
